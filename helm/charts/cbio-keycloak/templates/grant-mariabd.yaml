apiVersion: k8s.mariadb.com/v1alpha1
kind: Grant
metadata:
  name: keycloak-rw
spec:
  mariaDbRef:
    name: cbio-keycloak-mariadb
  username: keycloak-rw
  privileges:
    - "ALL PRIVILEGES"
  database: "keycloak"
  table: "*"
  grantOption: true
  host: "%"
  # Delete the resource in the database whenever the CR gets deleted.
  # Alternatively, you can specify Skip in order to omit deletion.
  cleanupPolicy: Delete
  requeueInterval: 30s
  retryInterval: 5s