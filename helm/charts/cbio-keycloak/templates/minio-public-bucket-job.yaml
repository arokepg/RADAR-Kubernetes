{{- if .Values.minio.publicBucketJob.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: cbio-keycloak-upload-openid-configuration
  namespace: {{ .Release.Namespace }}
  labels:
    {{ include "common.labels.standard" . | indent 4 | trim }}
spec:
  parallelism: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: upload-openid-configuration
          image: {{ printf "%s/%s:%s" .Values.minio.publicBucketJob.registry .Values.minio.publicBucketJob.repository .Values.minio.publicBucketJob.tag  | quote }}
          imagePullPolicy: {{ .Values.minio.publicBucketJob.pullPolicy }}
          env:
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.minio.publicBucketJob.credentialsSecretName | quote }}
                  key: accessKey
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.minio.publicBucketJob.credentialsSecretName | quote }}
                  key: secretKey
            - name: MINIO_ENDPOINT
              value: {{ .Values.minio.publicBucketJob.endpoint | quote }}
            - name: BUCKET
              value: {{ .Values.minio.publicBucketJob.bucketName | quote }}
          command: ["sh", "-c"]
          args:
            - |
              #!/usr/bin/env bash
              set -e
              HOSTPORT=$(echo "$MINIO_ENDPOINT" | sed -E 's#^https?://##')
              HOST=$(echo "$HOSTPORT" | cut -d: -f1)
              PORT=$(echo "$HOSTPORT" | cut -s -d: -f2)
              if [ -z "$PORT" ]; then PORT=9000; fi
              echo "Waiting for MinIO at $HOST:$PORT ..."
              for i in $(seq 1 120); do
                mc alias set minio "$MINIO_ENDPOINT" "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY" >/dev/null 2>&1 && echo "MinIO is reachable" && break || true
                sleep 2
              done

              echo "Configuring mc alias ..."
              mc alias set minio "$MINIO_ENDPOINT" "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY"

              echo "Creating bucket if not exists ..."
              mc mb --ignore-existing minio/$BUCKET || true

              echo "Setting anonymous download policy ..."
              mc anonymous set download minio/$BUCKET

              echo "Uploading openid-configuration.json ..."
              mc put /data/openid-configuration.json minio/$BUCKET/openid-configuration.json
          volumeMounts:
            - name: openid-config
              mountPath: /data
      volumes:
        - name: openid-config
          configMap:
            name: cbio-keycloak-openid-config
{{- end }}
