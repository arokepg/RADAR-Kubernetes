serverName: localhost
advertised_protocol: https
replicaCount: 1

image:
  registry: quay.io
  repository: keycloak/keycloak
  tag:

database:
  url: jdbc:mariadb://radar-keycloak-mariadb-internal:3306/keycloak
  usernameSecret:
    name: radar-keycloak-mariadb-user
    key: username
  passwordSecret:
    name: radar-keycloak-mariadb-user
    key: password

email:
  enabled: false
  emailFrom: pim@thehyve.nl
  emailFromDisplayName: Pim van Nierop
  replyTo: pim@thehyve.nl
  replyToDisplayName: Pim van Nierop
  smtp:
    host:
    port: 587
    username:
    password:
    auth: true
    startTls: true

operator:
  keycloakUrl: 'http://{{ include "common.names.fullname" . }}-service.{{ .Release.Namespace }}.svc:8080'

keycloak:
  # -- Set new env vars here.
  additionalOptions: []

# for client specific loging procedure see: https://stackoverflow.com/questions/79533407/how-to-restrict-user-login-to-specific-clients-in-keycloak-based-on-attributes
realms:
  - name: radar-base

    email:
      enabled: false

    userAttributes:
      - name: policy
        displayName: minio-policy
        multivalued: true

    roles:
      - name: ROLE_SYS_ADMIN
      - name: "MAIN:ROLE_ORGANIZATION_ADMIN"
      - name: "STAGING_PROJECT:ROLE_PROJECT_ADMIN"

    clientScopes:
      - name: MEASUREMENT.CREATE
        description: OpenID Connect custom scope
        attributes:
          - name: include.in.token.scope
            value: "true"
      - name: MEASUREMENT.READ
        description: OpenID Connect custom scope
        attributes:
          - name: include.in.token.scope
            value: "true"
