      - name: ManagementPortalapp-dedicated
        description: OpenID Connect custom scope
        attributes:
          - name: include.in.token.scope
            value: "true"
          - name: display.on.consent.screen
            value: "false"

    groups:
      - name: sys_admin
      - name: "Main:org_admin"
      - name: "STAGING_PROJECT:project_admin"

    clients:
      - name: ManagementPortalapp
        clientId: ManagementPortalapp
        webUrl: '{{ .Values.advertised_protocol }}://{{ .Values.serverName }}/managementportal'
        serviceAccount:
          enabled: true
        attributes:
          token.endpoint.auth.method: client_secret_post
        defaultClientScopes:
          - roles
        optionalClientScopes:
          - MEASUREMENT.CREATE
          - MEASUREMENT.READ
          - MEASUREMENT.UPDATE
          - MEASUREMENT.DELETE
          - SUBJECT.CREATE
          - SUBJECT.READ
          - SUBJECT.UPDATE
          - SUBJECT.DELETE
          - PROJECT.CREATE
          - PROJECT.READ
          - PROJECT.UPDATE
          - PROJECT.DELETE
          - SOURCETYPE.CREATE
          - SOURCETYPE.READ
          - SOURCETYPE.UPDATE
          - SOURCETYPE.DELETE
          - SOURCEDATA.CREATE
          - SOURCEDATA.READ
          - SOURCEDATA.UPDATE
          - SOURCEDATA.DELETE
          - SOURCE.CREATE
          - SOURCE.READ
          - SOURCE.UPDATE
          - SOURCE.DELETE
          - USER.CREATE
          - USER.READ
          - USER.UPDATE
          - USER.DELETE
          - ROLE.CREATE
          - ROLE.READ
          - ROLE.UPDATE
          - ROLE.DELETE
          - OAUTHCLIENTS.CREATE
          - OAUTHCLIENTS.READ
          - OAUTHCLIENTS.UPDATE
          - OAUTHCLIENTS.DELETE
          - AUDIT.READ
          - AUTHORITY.READ
          - MEASUREMENT.READ
          - MEASUREMENT.CREATE
        redirectUris:
          - '{{ .Values.advertised_protocol }}://{{ .Values.serverName }}/managementportal/*'

ingress:
  enabled: true
  hostname: 'keycloak.{{ .Values.serverName }}'
  ingressClassName: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "8"
    nginx.ingress.kubernetes.io/proxy-busy-buffers-size: "64k"
  path: /
  pathType: ImplementationSpecific
  backend: '{{ include "common.names.fullname" . }}-service'
  tls: true
  selfSigned: false

metrics:
  enabled: false

prometheus:
  enabled: false

serviceMonitor:
  enabled: false
  port: management
  path: /metrics
