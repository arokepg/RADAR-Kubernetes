{{ range .Values.realms }}
{{ $realmName := .name }}
{{ range .roles }}
apiVersion: v1.edp.epam.com/v1
kind: KeycloakRealmRole
metadata:
  name: {{ $realmName }}-{{ include "radar-keycloak.name.clean" .name }}
spec:
  description: {{ .description }}
  name: {{ .name }}
  realmRef:
    name: {{ include "common.names.fullname" $ }}-{{ $realmName }}
    kind: KeycloakRealm
---
{{ end }}
{{ end }}
