# must be localhost for session cookies to work in 'secure' mode
server_name: localhost

base_timeout: 360
atomicInstall: false

app_config_frontend:
  advertised_protocol: http
management_portal:
  advertised_protocol: http
  oauth_clients:
    radar_rest_sources_authorizer:
      redirect_uri:
        - http://localhost/rest-sources/authorizer/login
    radar_upload_frontend:
      redirect_uri:
        - http://localhost/upload/login
    radar_app_config_frontend:
      redirect_uri:
        - http://localhost/appconfig/login
    grafana_dashboard:
      redirect_uri:
        - http://dashboard.localhost/login/generic_oauth
radar_appserver:
  advertised_protocol: http
radar_rest_sources_authorizer:
  advertised_protocol: http
radar_rest_sources_backend:
  advertised_protocol: http
radar_upload_connect_frontend:
  advertised_protocol: http
radar_upload_connect_backend:
  advertised_protocol: http
radar_home:
  s3:
    url: http://s3.localhost/login
  dashboard:
    url: http://grafana.localhost
  logging:
    enabled: true # either logging or monitoring must be enabled or radar-home crashes
    url: http://graylog.localhost
  monitoring:
    enabled: true # either logging or monitoring must be enabled or radar-home crashes
    url: http://grafana.localhost/login
radar_kratos:
  kratos:
    advertised_protocol: http
radar_hydra:
  hydra:
    advertised_protocol: http
radar_jdbc_connector_data_dashboard_backend:
  timescaledb:
    cluster:
      cluster:
        monitoring:
          enabled: false
      backups:
        enabled: false
radar_jdbc_connector_grafana:
  timescaledb:
    cluster:
      cluster:
        monitoring:
          enabled: false
        backups:
          enabled: false
radar_jdbc_connector_realtime_dashboard:
  timescaledb:
    cluster:
      cluster:
        monitoring:
          enabled: false
        backups:
          enabled: false

radar_grafana:
  grafana:
    advertised_protocol: http
radar_self_enrolment_ui:
  advertised_protocol: http

cloudnative_postgresql:
  cluster:
    backups:
      enabled: false

radar_nifi:
  advertised_protocol: http
  nifi-cluster:
    cluster:
      singleUserConfiguration:
        # Nifi on HTTP never uses authentication
        enabled: false
      listenersConfig:
        internalListeners:
          - type: http
            name: http
            containerPort: 8080
          - type: cluster
            name: cluster
            containerPort: 6007
          - type: s2s
            name: s2s
            containerPort: 10000
        sslSecrets: null
      externalServices:
        - name: nifikop
          spec:
            portConfigs:
              - internalListenerName: http
                port: 80
              - internalListenerName: s2s
                port: 10000
            type: LoadBalancer
  ingress:
    annotations:
      nginx.ingress.kubernetes.io/backend-protocol: HTTP
    tls: false
